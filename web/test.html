<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GogoClaw Web UI - Test</title>
    <script src="https://cdn.staticfile.org/vue/3.3.4/vue.global.prod.js"></script>
    <link rel="stylesheet" href="https://cdn.staticfile.org/element-plus/2.4.4/index.css">
    <script src="https://cdn.staticfile.org/element-plus/2.4.4/index.full.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #667eea; }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <h1>🦾 GogoClaw Web UI</h1>
            <el-card>
                <h2>✅ 测试成功！</h2>
                <p>Vue 和 Element Plus 已正确加载。</p>
                <el-button type="primary" @click="count++">点击次数：{{ count }}</el-button>
            </el-card>
        </div>
    </div>
    
    <script>
        const { createApp, ref } = Vue;
        
        createApp({
            setup() {
                const count = ref(0);
                return { count };
            }
        })
        .use(ElementPlus)
        .mount('#app');
    </script>
</body>
</html>
